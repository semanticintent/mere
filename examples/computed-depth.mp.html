<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Computed Depth</title>
  <script src="../dist/mere-runtime.js"></script>
</head>
<body>

<workbook theme="classic-light">

  <state>
    <value name="workouts" type="record-list"
      default='[{"date":"2024-01-08","type":"Run","duration":45,"done":true},{"date":"2024-01-09","type":"Cycle","duration":60,"done":true},{"date":"2024-01-10","type":"Run","duration":30,"done":true},{"date":"2024-01-11","type":"Swim","duration":40,"done":true},{"date":"2024-01-12","type":"Run","duration":50,"done":true},{"date":"2024-01-13","type":"Cycle","duration":75,"done":true},{"date":"2024-01-14","type":"Run","duration":35,"done":true},{"date":"2024-01-15","type":"Swim","duration":55,"done":true}]'>
      <field name="date"     type="text" />
      <field name="type"     type="text" />
      <field name="duration" type="number" default="0" />
      <field name="done"     type="boolean" default="false" />
    </value>
    <value name="new-date"     type="text" />
    <value name="new-type"     type="text" />
    <value name="new-duration" type="number" />
  </state>

  <computed>
    <value name="total-sessions"   from="workouts" op="count" />
    <value name="avg-duration"     from="workouts" op="avg"    field="duration" />
    <value name="rolling-avg-7"    from="workouts" op="avg"    field="duration" window="7" />
    <value name="best-session"     from="workouts" op="max"    field="duration" />
    <value name="shortest-session" from="workouts" op="min"    field="duration" />
    <value name="current-streak"   from="workouts" op="streak" field="done" by="date" where="done = true" />
  </computed>

  <actions>
    <action name="log-workout">
      add-to workouts date new-date type new-type duration new-duration done "true"
      clear new-date
      clear new-type
      clear new-duration
    </action>
  </actions>

  <screen name="dashboard">
    <header>
      <heading>Workout Log</heading>
    </header>

    <card>
      <subtitle>Summary</subtitle>
      <kv label="Total sessions"      @total-sessions />
      <kv label="All-time avg (min)"  @avg-duration />
      <kv label="Rolling avg — last 7" @rolling-avg-7 />
      <kv label="Best session (min)"  @best-session />
      <kv label="Shortest (min)"      @shortest-session />
      <kv label="Current streak"      @current-streak />
    </card>

    <card>
      <subtitle>Minutes by type</subtitle>
      <chart type="bar" from="workouts" field="duration" label="type" />
    </card>

    <card>
      <subtitle>Log a workout</subtitle>
      <form>
        <field ~new-date       placeholder="Date (YYYY-MM-DD)" />
        <field ~new-type       placeholder="Type (Run / Cycle / Swim)" />
        <field ~new-duration   type="number" placeholder="Duration (min)" />
        <button !log-workout>Log workout</button>
      </form>
    </card>
  </screen>

</workbook>

</body>
</html>
