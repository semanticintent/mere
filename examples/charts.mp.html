<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Charts</title>
  <script src="../dist/mere-runtime.js"></script>
</head>
<body>

<workbook theme="classic-light">

  <state>
    <value name="expenses" type="record-list"
      default='[{"category":"Food","amount":420},{"category":"Travel","amount":850},{"category":"Housing","amount":1800},{"category":"Software","amount":120},{"category":"Health","amount":95}]'>
      <field name="category" type="text" />
      <field name="amount"   type="number" default="0" />
    </value>
    <value name="weight-log" type="record-list"
      default='[{"value":78.2},{"value":77.9},{"value":78.1},{"value":77.6},{"value":77.4},{"value":77.0},{"value":76.8}]'>
      <field name="value" type="number" default="0" />
    </value>
    <value name="new-category" type="text" />
    <value name="new-amount"   type="number" />
    <value name="new-weight"   type="number" />
  </state>

  <actions>
    <action name="add-expense">
      add-to expenses category new-category amount new-amount
      clear new-category
      clear new-amount
    </action>
    <action name="add-weight">
      add-to weight-log value new-weight
      clear new-weight
    </action>
  </actions>

  <screen name="charts">
    <header>
      <heading>Charts</heading>
    </header>

    <card>
      <subtitle>Spend by category (bar)</subtitle>
      <chart type="bar" from="expenses" field="amount" label="category" />
    </card>

    <card>
      <subtitle>Weight trend (line)</subtitle>
      <chart type="line" from="weight-log" field="value" />
    </card>

    <card>
      <subtitle>Spend breakdown (pie)</subtitle>
      <chart type="pie" from="expenses" field="amount" label="category" />
    </card>

    <card>
      <subtitle>Add an expense</subtitle>
      <form>
        <field ~new-category placeholder="Category (e.g. Food)" />
        <field ~new-amount type="number" placeholder="Amount" />
        <button !add-expense>Add expense</button>
      </form>
    </card>

    <card>
      <subtitle>Log a weight entry</subtitle>
      <form>
        <field ~new-weight type="number" placeholder="Weight (kg)" />
        <button !add-weight>Log weight</button>
      </form>
    </card>
  </screen>

</workbook>

</body>
</html>
