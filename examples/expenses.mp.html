<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Expenses</title>
  <script src="../dist/mere-runtime.js"></script>
</head>
<body>

<workbook theme="classic-light">

  <state>
    <value name="expenses" type="record-list"
      default='[{"id":"e1","description":"Groceries","amount":85,"category":"food"},{"id":"e2","description":"Train tickets","amount":42,"category":"travel"},{"id":"e3","description":"Lunch","amount":18,"category":"food"},{"id":"e4","description":"Hotel","amount":210,"category":"travel"},{"id":"e5","description":"Coffee","amount":6,"category":"food"}]'>
      <field name="description" type="text" />
      <field name="amount"      type="number" default="0" />
      <field name="category"    type="text"   default="general" />
    </value>
    <value name="new-description" type="text" />
    <value name="new-amount"      type="number" />
    <value name="new-category"    type="text" />
  </state>

  <computed>
    <value name="total"        from="expenses" op="sum"   field="amount" />
    <value name="count"        from="expenses" op="count" />
    <value name="food-total"   from="expenses" op="sum"   field="amount" where='category = "food"' />
    <value name="travel-total" from="expenses" op="sum"   field="amount" where='category = "travel"' />
  </computed>

  <actions>
    <action name="add-expense">
      add-to expenses description new-description amount new-amount category new-category
      clear new-description
      clear new-amount
      clear new-category
    </action>
    <action name="remove-expense" takes="eid">
      remove-from expenses where id = eid
    </action>
  </actions>

  <screen name="expenses">
    <header>
      <heading>Expenses</heading>
      <badge @count />
    </header>

    <card>
      <subtitle>Summary</subtitle>
      <kv label="Total"  @total />
      <kv label="Food"   @food-total />
      <kv label="Travel" @travel-total />
    </card>

    <card>
      <subtitle>Add an expense</subtitle>
      <form>
        <field ~new-description placeholder="Description" />
        <field ~new-amount      type="number" placeholder="Amount" />
        <field ~new-category    placeholder="Category (food / travel / general)" />
        <button !add-expense>Add expense</button>
      </form>
    </card>

    <list @expenses>
      <card>
        <heading @item.description />
        <badge @item.category />
        <kv label="Amount" @item.amount />
        <button !remove-expense with item.id>Remove</button>
      </card>
    </list>
  </screen>

</workbook>

</body>
</html>
